name: Build Release Artifacts

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (leave empty for current commit)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: '${{ github.event.inputs.tag || github.ref }}' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyinstaller
      - run: pyinstaller SaveSync.spec --noconfirm

      - name: Verify EXE
        shell: pwsh
        run: |
          $exe = "dist\SaveSync.exe"
          if (-not (Test-Path $exe)) { throw "EXE not found" }
          $header = (Get-Content $exe -AsByteStream -TotalCount 2)
          if ($header[0] -ne 0x4D -or $header[1] -ne 0x5A) { throw "Not a valid PE" }
          $result = & $exe --version 2>&1
          if ($LASTEXITCODE -ne 0) { throw "--version failed" }
          Write-Host "PE verified (MZ), smoke test passed: $result"

      - name: Package artifact
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || github.ref_name }}"
          $exe_name = "SaveSync-${tag}-windows-x64.exe"
          $hash = (Get-FileHash dist\SaveSync.exe -Algorithm SHA256).Hash.ToLower()
          Copy-Item dist\SaveSync.exe "dist\$exe_name"
          Set-Content "dist\$exe_name.sha256" -Value "SHA256 ($exe_name) = $hash"

          $report = @"
          Build Report
          ============
          Timestamp:    $(Get-Date -Format 'u')
          Commit:       ${{ github.sha }}
          Tag:          $tag
          Platform:     windows-latest
          Python:       $(python --version 2>&1)
          PyInstaller:  $(pyinstaller --version 2>&1)
          Artifact:     $exe_name
          SHA-256:      $hash
          Smoke test:   PASSED
          PE verify:    PASSED
          "@
          Set-Content "dist\build-report-windows.txt" -Value $report
          Write-Host $report

      - uses: actions/upload-artifact@v4
        with:
          name: SaveSync-windows-x64
          path: dist/SaveSync*
          compression-level: 0

      - name: Upload to release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          gh release upload $tag "dist/SaveSync-${tag}-windows-x64.exe" --clobber
          gh release upload $tag "dist/SaveSync-${tag}-windows-x64.exe.sha256" --clobber
          gh release upload $tag "dist/build-report-windows.txt" --clobber

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: '${{ github.event.inputs.tag || github.ref }}' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyinstaller
      - run: pyinstaller SaveSync.spec --noconfirm

      - name: Verify binary
        run: |
          exe="dist/SaveSync"
          if [ ! -f "$exe" ]; then echo "Binary not found"; exit 1; fi
          ./dist/SaveSync --version || { echo "--version failed"; exit 1; }
          echo "Smoke test passed"

      - name: Package artifact
        run: |
          tag="${{ github.event.release.tag_name || github.ref_name }}"
          exe_name="SaveSync-${tag}-linux-x64"
          hash=$(sha256sum "dist/SaveSync" | cut -d' ' -f1)
          cp "dist/SaveSync" "dist/${exe_name}"
          tar -czf "dist/${exe_name}.tar.gz" "dist/${exe_name}"
          echo "$hash" > "dist/${exe_name}.sha256"

          cat > "dist/build-report-linux.txt" <<EOF
          Build Report
          ============
          Timestamp:    $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          Commit:       ${{ github.sha }}
          Tag:          ${tag}
          Platform:     ubuntu-latest
          Python:       $(python --version 2>&1)
          PyInstaller:  $(pyinstaller --version 2>&1)
          Artifact:     ${exe_name}
          SHA-256:      ${hash}
          Smoke test:   PASSED
          PE verify:    N/A (Linux ELF)
          EOF
          cat "dist/build-report-linux.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: SaveSync-linux-x64
          path: dist/SaveSync*
          compression-level: 0

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          gh release upload "$tag" "dist/SaveSync-${tag}-linux-x64" --clobber
          gh release upload "$tag" "dist/SaveSync-${tag}-linux-x64.tar.gz" --clobber
          gh release upload "$tag" "dist/SaveSync-${tag}-linux-x64.sha256" --clobber
          gh release upload "$tag" "dist/build-report-linux.txt" --clobber
