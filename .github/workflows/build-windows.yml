name: Build Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (leave empty for current commit)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            suffix: windows-x64.exe
            artifact_name: SaveSync-windows-x64
            smoke_cmd: |
              $result = & "dist\SaveSync.exe" --version 2>&1
              if ($LASTEXITCODE -ne 0) { exit 1 }
              $result
          - os: ubuntu-latest
            suffix: linux-x64
            artifact_name: SaveSync-linux-x64
            smoke_cmd: |
              ./dist/SaveSync --version

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Display build info
        run: |
          python --version
          pyinstaller --version
          echo "ref=${{ github.ref }}"
          echo "tag=${{ github.event.release.tag_name }}"

      - name: Build executable with PyInstaller
        run: pyinstaller SaveSync.spec --noconfirm

      - name: Verify executable
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}
        run: |
          # Check file exists
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            exe="dist\SaveSync.exe"
          else
            exe="dist/SaveSync"
          fi
          if [ ! -f "$exe" ]; then
            echo "ERROR: $exe not found"
            exit 1
          fi
          size=$(stat -c%s "$exe" 2>/dev/null || (Get-Item "$exe").Length)
          echo "Size: $size bytes"

          # Verify PE header on Windows
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            header=$(powershell -Command "(Get-Content '$exe' -Encoding Byte -TotalCount 2) -join ','")
            if [ "$header" != "77,90" ]; then
              echo "ERROR: Not a valid PE executable"
              exit 1
            fi
            echo "PE header verified (MZ)"
          fi

          # Smoke test: --version
          eval "${{ matrix.smoke_cmd }}" || {
            echo "ERROR: --version smoke test failed"
            exit 1
          }
          echo "Smoke test passed"

      - name: Compute SHA-256
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}
        run: |
          TAG="${{ github.event.release.tag_name || github.ref_name }}"
          FILENAME="SaveSync-${TAG}-${{ matrix.suffix }}"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            hash=$(Get-FileHash -Path "dist\SaveSync.exe" -Algorithm SHA256).Hash.ToLower()
            Copy-Item "dist\SaveSync.exe" "dist\$FILENAME"
          else
            hash=$(sha256sum "dist/SaveSync" | cut -d' ' -f1)
            cp "dist/SaveSync" "dist/${FILENAME}.tar.gz"
            tar -czf "dist/${FILENAME}.tar.gz" -C dist SaveSync
          fi
          echo "$hash" > "dist/${FILENAME}.sha256"
          echo "SHA256 ($FILENAME) = $hash"

      - name: Generate build report
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}
        run: |
          TAG="${{ github.event.release.tag_name || github.ref_name }}"
          COMMIT="${{ github.sha }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PYTHON_VER=$(python --version 2>&1)
          PYI_VER=$(pyinstaller --version 2>&1)
          EXE_NAME="SaveSync-${TAG}-${{ matrix.suffix }}"

          cat > "dist/build-report-${{ matrix.suffix }}.txt" <<EOF
          Build Report
          ============
          Timestamp:    $TIMESTAMP
          Commit:       $COMMIT
          Tag:          $TAG
          Platform:     ${{ matrix.os }}
          Python:       $PYTHON_VER
          PyInstaller:  $PYI_VER
          Artifact:     $EXE_NAME
          SHA-256:      $(cat "dist/${EXE_NAME}.sha256")
          Smoke test:   PASSED
          PE verify:    ${{ matrix.os == 'windows-latest' && 'PASSED' || 'N/A (Linux ELF)' }}
          EOF

          echo "=== Build Report ==="
          cat "dist/build-report-${{ matrix.suffix }}.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/SaveSync*
          compression-level: 0

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          EXE_NAME="SaveSync-${TAG}-${{ matrix.suffix }}"

          gh release upload "$TAG" "dist/${EXE_NAME}" --clobber
          gh release upload "$TAG" "dist/${EXE_NAME}.sha256" --clobber
          gh release upload "$TAG" "dist/build-report-${{ matrix.suffix }}.txt" --clobber

          echo "Uploaded ${EXE_NAME} and build report to release ${TAG}"
